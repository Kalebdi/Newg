<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Solihah — Waktu Shalat Presisi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;400;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; min-height: 100vh; }
        .glass { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); backdrop-filter: blur(20px); }
        .glow-text { text-shadow: 0 0 40px rgba(59,130,246,0.4); }
        .gradient-text { background: linear-gradient(to bottom, #fff, #444); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .loading-spinner { border: 2px solid rgba(255,255,255,0.1); border-top-color: #3b82f6; border-radius: 50%; width: 24px; height: 24px; animation: spin 0.8s linear infinite; margin: 0 auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .suggestion-item { padding: 12px 16px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05); transition: all 0.2s; }
        .suggestion-item:hover { background: rgba(59,130,246,0.3); }
        .suggestions-box { position: absolute; top: 100%; left: 0; right: 0; background: rgba(0,0,0,0.95); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; max-height: 300px; overflow-y: auto; z-index: 50; backdrop-filter: blur(10px); }
        input:focus { outline: none; border-color: #3b82f6; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-8 text-center">

    <!-- Halaman Awal -->
    <div id="setup" class="w-full max-w-xs">
        <h1 class="text-4xl font-extrabold tracking-tighter mb-8 italic">SOLIHAH</h1>
        
        <button onclick="initGPS()" id="gpsBtn" class="w-full border border-white/20 py-5 rounded-full font-bold text-[10px] uppercase tracking-[0.4em] hover:bg-white/10 active:bg-white active:text-black transition-all mb-4">
            📍 DETEKSI LOKASI GPS
        </button>
        
        <div class="mt-4 w-full">
            <div class="relative">
                <input type="text" id="searchInput" 
                       placeholder="Cari kota... contoh: istanbul turkey, munjul, tokyo" 
                       class="w-full bg-black/50 border border-white/20 rounded-full py-3 px-5 text-white text-sm placeholder:text-gray-500 focus:outline-none focus:border-blue-500"
                       onkeyup="doSearch()"
                       onkeypress="if(event.key === 'Enter') selectFirstResult()"
                       autocomplete="off">
                <div id="suggestions" class="suggestions-box hidden"></div>
            </div>
            <p class="text-[8px] text-gray-500 mt-3">✨ Cerdas: bisa salah ketik, urutan acak, semua negara</p>
            <p class="text-[8px] text-gray-600 mt-1">Atau <button onclick="showManual()" class="text-blue-400 underline">koordinat manual</button></p>
        </div>
        
        <div id="manualBox" class="hidden mt-4">
            <input type="text" id="latInput" placeholder="Lintang (-6.2088)" class="w-full p-2 bg-black/50 border border-white/20 rounded text-white text-sm mb-2">
            <input type="text" id="lonInput" placeholder="Bujur (106.8456)" class="w-full p-2 bg-black/50 border border-white/20 rounded text-white text-sm mb-2">
            <button onclick="useManual()" class="bg-blue-600 px-4 py-2 rounded-full text-xs w-full">Gunakan</button>
        </div>
        
        <div id="loading" class="hidden mt-4"><div class="loading-spinner"></div><p class="text-[10px] text-gray-400 mt-2">Mencari...</p></div>
    </div>

    <!-- Halaman Utama -->
    <div id="main" class="hidden w-full max-w-sm flex flex-col items-center">
        <div class="flex items-center gap-2 mb-4 opacity-70">
            <div class="w-1.5 h-1.5 bg-blue-500 rounded-full animate-pulse"></div>
            <p id="locName" class="text-[9px] font-black uppercase tracking-[0.5em] italic">Memuat...</p>
        </div>
        <h1 id="clock" class="text-8xl font-extrabold tracking-tighter leading-none mb-10 glow-text italic">00:00</h1>
        <div class="glass w-full py-8 rounded-[3rem] mb-10">
            <p id="nextName" class="text-[8px] font-black text-blue-500 uppercase tracking-[0.6em] mb-2 italic">---</p>
            <p id="countdown" class="text-5xl font-light tracking-widest gradient-text">00:00:00</p>
        </div>
        <div id="timesList" class="grid grid-cols-5 gap-2 w-full mb-10 px-2"></div>
        <p id="date" class="text-[8px] text-gray-700 font-black uppercase tracking-[0.6em] mt-auto"></p>
        <p id="coord" class="text-[6px] text-gray-800 mt-2"></p>
        <button onclick="backToSetup()" class="mt-4 text-[8px] text-gray-600 underline">Ubah Lokasi</button>
    </div>

    <audio id="adzan" preload="auto"><source src="https://www.islamcan.com/common/adzan/makkah.mp3"></audio>

    <script>
        let prayerData = null, timer = null, currentLat = null, currentLon = null;
        let searchResults = [];
        const audio = document.getElementById('adzan');
        
        // PENCARIAN PINTAR - langsung panggil Nominatim API
        let searchTimeout;
        window.doSearch = function() {
            clearTimeout(searchTimeout);
            const q = document.getElementById('searchInput').value.trim();
            if (q.length < 2) {
                document.getElementById('suggestions').classList.add('hidden');
                return;
            }
            
            searchTimeout = setTimeout(async () => {
                const loadingDiv = document.getElementById('loading');
                loadingDiv.classList.remove('hidden');
                
                try {
                    // Panggil Nominatim langsung dari browser
                    const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q)}&limit=8&addressdetails=1&accept-language=id`;
                    const res = await fetch(url, { headers: { 'User-Agent': 'Solihah-App' } });
                    const data = await res.json();
                    loadingDiv.classList.add('hidden');
                    
                    if (data && data.length > 0) {
                        searchResults = data;
                        const suggestionsDiv = document.getElementById('suggestions');
                        suggestionsDiv.innerHTML = data.map((item, i) => {
                            let displayName = item.display_name;
                            if (displayName.length > 60) displayName = displayName.substring(0, 60) + '...';
                            return `<div class="suggestion-item" onclick="selectResult(${i})">
                                <div class="flex justify-between">
                                    <span class="font-medium">${escapeHtml(item.display_name.split(',')[0])}</span>
                                    <span class="text-[9px] text-blue-400">${item.address?.country || ''}</span>
                                </div>
                                <div class="text-[10px] text-gray-400">${escapeHtml(displayName)}</div>
                            </div>`;
                        }).join('');
                        suggestionsDiv.classList.remove('hidden');
                    } else {
                        document.getElementById('suggestions').innerHTML = '<div class="p-4 text-center text-gray-500">Tidak ditemukan. Coba kata lain.</div>';
                        document.getElementById('suggestions').classList.remove('hidden');
                    }
                } catch (err) {
                    loadingDiv.classList.add('hidden');
                    console.error(err);
                    document.getElementById('suggestions').innerHTML = '<div class="p-4 text-center text-red-400">Gagal mencari. Cek koneksi.</div>';
                    document.getElementById('suggestions').classList.remove('hidden');
                }
            }, 400);
        };
        
        window.selectResult = function(index) {
            const item = searchResults[index];
            if (item) {
                const lat = parseFloat(item.lat);
                const lon = parseFloat(item.lon);
                const name = item.display_name;
                document.getElementById('searchInput').value = name;
                document.getElementById('suggestions').classList.add('hidden');
                proceedWithLocation(lat, lon, name);
            }
        };
        
        window.selectFirstResult = function() {
            if (searchResults && searchResults.length > 0) {
                selectResult(0);
            } else {
                // Coba langsung cari
                const q = document.getElementById('searchInput').value.trim();
                if (q) searchDirectly(q);
            }
        };
        
        async function searchDirectly(q) {
            const loading = document.getElementById('loading');
            loading.classList.remove('hidden');
            try {
                const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q)}&limit=1&addressdetails=1`;
                const res = await fetch(url, { headers: { 'User-Agent': 'Solihah-App' } });
                const data = await res.json();
                loading.classList.add('hidden');
                if (data && data.length > 0) {
                    const lat = parseFloat(data[0].lat);
                    const lon = parseFloat(data[0].lon);
                    proceedWithLocation(lat, lon, data[0].display_name);
                } else {
                    alert("Lokasi tidak ditemukan. Coba kata kunci lain.");
                }
            } catch (err) {
                loading.classList.add('hidden');
                alert("Gagal mencari lokasi.");
            }
        }
        
        // GPS
        window.initGPS = function() {
            if (!navigator.geolocation) { alert("GPS tidak didukung"); return; }
            const btn = document.getElementById('gpsBtn');
            btn.innerText = "MENDAPATKAN LOKASI...";
            btn.disabled = true;
            navigator.geolocation.getCurrentPosition(
                async (pos) => {
                    btn.innerText = "📍 DETEKSI LOKASI GPS";
                    btn.disabled = false;
                    const { latitude, longitude } = pos.coords;
                    try {
                        const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${latitude}&lon=${longitude}`);
                        const data = await res.json();
                        proceedWithLocation(latitude, longitude, data.display_name || "Lokasi GPS");
                    } catch {
                        proceedWithLocation(latitude, longitude, `GPS: ${latitude.toFixed(4)}, ${longitude.toFixed(4)}`);
                    }
                },
                (err) => {
                    btn.innerText = "📍 DETEKSI LOKASI GPS";
                    btn.disabled = false;
                    alert("Gagal GPS: " + err.message);
                }
            );
        };
        
        window.showManual = () => document.getElementById('manualBox').classList.toggle('hidden');
        window.useManual = () => {
            const lat = parseFloat(document.getElementById('latInput').value);
            const lon = parseFloat(document.getElementById('lonInput').value);
            if (isNaN(lat) || isNaN(lon)) { alert("Koordinat tidak valid"); return; }
            proceedWithLocation(lat, lon, `Manual: ${lat}, ${lon}`);
        };
        window.backToSetup = () => {
            if (timer) clearInterval(timer);
            document.getElementById('main').classList.add('hidden');
            document.getElementById('setup').classList.remove('hidden');
            prayerData = null;
        };
        
        async function proceedWithLocation(lat, lon, name) {
            document.getElementById('setup').classList.add('hidden');
            document.getElementById('main').classList.remove('hidden');
            document.getElementById('locName').innerHTML = name.toUpperCase().substring(0, 50);
            document.getElementById('coord').innerHTML = `${lat.toFixed(4)}°, ${lon.toFixed(4)}°`;
            currentLat = lat;
            currentLon = lon;
            
            // Ambil jadwal shalat
            try {
                const url = `https://api.aladhan.com/v1/timings?latitude=${lat}&longitude=${lon}&method=20`;
                const res = await fetch(url);
                const data = await res.json();
                if (data.code === 200 && data.data && data.data.timings) {
                    prayerData = data.data.timings;
                    renderTimes();
                    if (timer) clearInterval(timer);
                    timer = setInterval(updateClock, 1000);
                    updateClock();
                } else {
                    throw new Error("Data tidak valid");
                }
            } catch (err) {
                alert("Gagal mengambil jadwal shalat. Periksa koneksi.");
            }
        }
        
        function renderTimes() {
            if (!prayerData) return;
            const list = [
                { name: 'Subuh', time: prayerData.Fajr },
                { name: 'Dzuhur', time: prayerData.Dhuhr },
                { name: 'Ashar', time: prayerData.Asr },
                { name: 'Maghrib', time: prayerData.Maghrib },
                { name: 'Isya', time: prayerData.Isha }
            ];
            document.getElementById('timesList').innerHTML = list.map(i => `
                <div class="flex flex-col items-center">
                    <span class="text-[7px] text-gray-700 uppercase mb-1">${i.name}</span>
                    <span class="text-[10px] font-mono text-gray-400">${i.time}</span>
                </div>
            `).join('');
        }
        
        function updateClock() {
            const now = new Date();
            const jam = now.getHours().toString().padStart(2,'0');
            const menit = now.getMinutes().toString().padStart(2,'0');
            document.getElementById('clock').innerHTML = `${jam}:${menit}`;
            document.getElementById('date').innerHTML = now.toLocaleDateString('id-ID', { day:'numeric', month:'long', year:'numeric' });
            
            if (!prayerData) return;
            
            const schedule = [
                { name: 'Subuh', time: prayerData.Fajr },
                { name: 'Dzuhur', time: prayerData.Dhuhr },
                { name: 'Ashar', time: prayerData.Asr },
                { name: 'Maghrib', time: prayerData.Maghrib },
                { name: 'Isya', time: prayerData.Isha }
            ];
            
            const currentSec = now.getHours() * 3600 + now.getMinutes() * 60 + now.getSeconds();
            let timesSec = schedule.map(s => {
                let [h, m] = s.time.split(':');
                return { name: s.name, sec: parseInt(h) * 3600 + parseInt(m) * 60 };
            });
            
            // Cari waktu berikutnya
            let next = null;
            for (let i = 0; i < timesSec.length; i++) {
                if (timesSec[i].sec > currentSec) {
                    next = timesSec[i];
                    break;
                }
            }
            if (!next) {
                next = { ...timesSec[0], sec: timesSec[0].sec + 86400 };
            }
            
            // Cek waktu adzan
            for (let i = 0; i < timesSec.length; i++) {
                if (timesSec[i].sec === currentSec) {
                    audio.play().catch(() => {});
                    break;
                }
            }
            
            const diff = next.sec - currentSec;
            const dh = Math.floor(diff / 3600).toString().padStart(2,'0');
            const dm = Math.floor((diff % 3600) / 60).toString().padStart(2,'0');
            const ds = (diff % 60).toString().padStart(2,'0');
            
            document.getElementById('countdown').innerHTML = `${dh}:${dm}:${ds}`;
            document.getElementById('nextName').innerHTML = `Menuju ${next.name}`;
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        // Sembunyikan saran saat klik di luar
        document.addEventListener('click', function(e) {
            if (!document.getElementById('searchInput').contains(e.target)) {
                document.getElementById('suggestions').classList.add('hidden');
            }
        });
        
        window.addEventListener('beforeunload', () => { if (timer) clearInterval(timer); });
    </script>
</body>
</html>
