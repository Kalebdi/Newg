<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Solihah — Presisi & Elegan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #3b82f6; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: #000; 
            color: #fff; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Background Decor */
        .bg-glow {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(59,130,246,0.15) 0%, rgba(0,0,0,0) 70%);
            z-index: -1;
            pointer-events: none;
        }

        /* Glassmorphism */
        .glass { 
            background: rgba(255,255,255,0.03); 
            border: 1px solid rgba(255,255,255,0.08); 
            backdrop-filter: blur(20px); 
        }

        .glow-text { text-shadow: 0 0 30px rgba(59,130,246,0.6); }
        
        .gradient-text { 
            background: linear-gradient(to bottom, #fff 30%, #94a3b8 100%); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
        }

        /* Animation */
        .fade-in { animation: fadeIn 0.6s cubic-bezier(0.22, 1, 0.36, 1); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .loading-spinner { 
            border: 2px solid rgba(255,255,255,0.1); 
            border-top-color: var(--accent); 
            border-radius: 50%; 
            width: 28px; height: 28px; 
            animation: spin 0.8s linear infinite; 
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Custom Input & Suggestions */
        input::placeholder { color: #475569; }
        .suggestion-item { 
            padding: 16px; 
            border-bottom: 1px solid rgba(255,255,255,0.05); 
            transition: 0.2s;
        }
        .suggestion-item:last-child { border: none; }
        .suggestion-item:active { background: rgba(59,130,246,0.2); }

        .btn-interact {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-interact:active { transform: scale(0.96); opacity: 0.8; }

        /* Typography */
        .font-mono-custom { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
    </style>
</head>
<body class="flex flex-col items-center justify-center p-6">
    <div class="bg-glow"></div>

    <!-- UI SETUP -->
    <div id="setup" class="w-full max-w-sm fade-in">
        <header class="mb-12 text-center">
            <h1 class="text-5xl font-extrabold tracking-tighter italic mb-2">SOLIHAH</h1>
            <p class="text-[10px] uppercase tracking-[0.4em] text-blue-500 font-bold">Precision Prayer Times</p>
        </header>
        
        <div class="space-y-4">
            <button onclick="initGPS()" id="gpsBtn" class="btn-interact w-full glass py-5 rounded-2xl font-bold text-xs uppercase tracking-widest flex items-center justify-center gap-3 border-blue-500/20">
                <span class="text-blue-500">📍</span> Deteksi GPS Presisi
            </button>

            <div class="relative group">
                <input type="text" id="searchInput" onkeyup="doSearch()" 
                    placeholder="Cari Kota / Desa / Alamat..." 
                    class="w-full bg-white/5 border border-white/10 rounded-2xl py-5 px-6 text-white text-sm focus:outline-none focus:border-blue-500/50 transition-all shadow-inner">
                <div id="suggestions" class="absolute top-full left-0 right-0 mt-2 glass rounded-2xl overflow-hidden hidden z-50 shadow-2xl"></div>
            </div>

            <div class="text-center">
                <button onclick="showManual()" class="text-[10px] uppercase tracking-widest text-gray-500 hover:text-blue-400 transition">Atau Koordinat Manual</button>
            </div>

            <div id="manualBox" class="hidden space-y-2 pt-2 fade-in">
                <div class="grid grid-cols-2 gap-2">
                    <input type="text" id="latInput" placeholder="Lat" class="bg-white/5 border border-white/10 rounded-xl p-4 text-sm text-center">
                    <input type="text" id="lonInput" placeholder="Lon" class="bg-white/5 border border-white/10 rounded-xl p-4 text-sm text-center">
                </div>
                <button onclick="useManual()" class="w-full bg-white text-black font-bold py-4 rounded-xl text-xs uppercase tracking-widest btn-interact">Terapkan</button>
            </div>
        </div>

        <div id="loading" class="hidden mt-10 flex flex-col items-center gap-3">
            <div class="loading-spinner"></div>
            <p id="loadingText" class="text-[9px] uppercase tracking-widest text-gray-500">Menyelaraskan Sinyal...</p>
        </div>
    </div>

    <!-- UI MAIN -->
    <div id="main" class="hidden w-full max-w-md fade-in flex flex-col items-center">
        <div class="mb-8 flex flex-col items-center">
            <div class="flex items-center gap-2 mb-2">
                <span class="w-1 h-1 bg-blue-500 rounded-full animate-ping"></span>
                <p id="locName" class="text-[10px] font-bold uppercase tracking-[0.3em] text-gray-400 truncate max-w-[250px] text-center">---</p>
            </div>
            <h1 id="clock" class="text-8xl font-black tracking-tighter leading-none glow-text gradient-text">00:00</h1>
        </div>

        <div class="w-full glass rounded-[2.5rem] p-10 mb-10 text-center relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-blue-500/20 to-transparent"></div>
            <p id="nextName" class="text-[9px] font-black text-blue-500 uppercase tracking-[0.5em] mb-4">---</p>
            <p id="countdown" class="text-6xl font-light tracking-tight font-mono-custom mb-2">00:00:00</p>
            <p class="text-[8px] text-gray-600 uppercase tracking-widest font-bold">Menuju Waktu Shalat</p>
        </div>

        <div id="timesList" class="grid grid-cols-5 gap-2 w-full mb-12"></div>

        <footer class="w-full border-t border-white/5 pt-8 flex flex-col items-center gap-3">
            <p id="date" class="text-[10px] font-bold text-gray-400 uppercase tracking-widest"></p>
            <div class="flex gap-4">
                <p id="coord" class="text-[8px] text-gray-700 font-mono-custom"></p>
                <p id="accuracyLabel" class="text-[8px] text-blue-900 font-bold uppercase"></p>
            </div>
            <button onclick="backToSetup()" class="btn-interact mt-4 px-6 py-2 border border-white/5 rounded-full text-[9px] uppercase tracking-[0.2em] text-gray-500 hover:text-white transition">Ganti Lokasi</button>
        </footer>
    </div>

    <audio id="adzan" preload="auto"><source src="https://www.islamcan.com/common/adzan/makkah.mp3"></audio>

    <script>
        let prayerData = null, timer = null;
        let searchResults = [];
        const audio = document.getElementById('adzan');
        
        // GPS Logic
        window.initGPS = function() {
            if (!navigator.geolocation) return alert("Browser tidak mendukung GPS");
            
            const btn = document.getElementById('gpsBtn');
            const loading = document.getElementById('loading');
            btn.classList.add('opacity-50');
            loading.classList.remove('hidden');

            navigator.geolocation.getCurrentPosition(
                async (pos) => {
                    const { latitude, longitude, accuracy } = pos.coords;
                    document.getElementById('accuracyLabel').innerText = `Acc: ${accuracy.toFixed(0)}m`;
                    
                    try {
                        const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${latitude}&lon=${longitude}&zoom=10`);
                        const data = await res.json();
                        const loc = data.address.city || data.address.town || data.address.village || "Lokasi Anda";
                        proceedWithLocation(latitude, longitude, loc);
                    } catch {
                        proceedWithLocation(latitude, longitude, "Lokasi GPS");
                    }
                },
                (err) => {
                    loading.classList.add('hidden');
                    btn.classList.remove('opacity-50');
                    alert("GPS Error: " + err.message);
                },
                { enableHighAccuracy: true, timeout: 15000 }
            );
        };

        // Search Logic
        let searchTimeout;
        window.doSearch = function() {
            clearTimeout(searchTimeout);
            const q = document.getElementById('searchInput').value.trim();
            const box = document.getElementById('suggestions');
            
            if (q.length < 3) return box.classList.add('hidden');
            
            searchTimeout = setTimeout(async () => {
                const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q)}&limit=5&addressdetails=1`);
                const data = await res.json();
                if (data.length > 0) {
                    searchResults = data;
                    box.innerHTML = data.map((item, i) => `
                        <div class="suggestion-item flex flex-col" onclick="selectResult(${i})">
                            <span class="text-sm font-bold text-white">${item.display_name.split(',')[0]}</span>
                            <span class="text-[10px] text-gray-500 truncate">${item.display_name}</span>
                        </div>
                    `).join('');
                    box.classList.remove('hidden');
                }
            }, 500);
        };

        window.selectResult = (i) => {
            const item = searchResults[i];
            proceedWithLocation(parseFloat(item.lat), parseFloat(item.lon), item.display_name.split(',')[0]);
        };

        async function proceedWithLocation(lat, lon, name) {
            document.getElementById('loading').classList.remove('hidden');
            try {
                const res = await fetch(`https://api.aladhan.com/v1/timings?latitude=${lat}&longitude=${lon}&method=20`);
                const data = await res.json();
                prayerData = data.data.timings;
                
                document.getElementById('setup').classList.add('hidden');
                document.getElementById('main').classList.remove('hidden');
                document.getElementById('locName').innerText = name;
                document.getElementById('coord').innerText = `${lat.toFixed(4)}, ${lon.toFixed(4)}`;
                
                renderTimes();
                if (timer) clearInterval(timer);
                timer = setInterval(updateUI, 1000);
                updateUI();
            } catch (err) {
                alert("Gagal memuat jadwal");
            } finally {
                document.getElementById('loading').classList.add('hidden');
            }
        }

        function renderTimes() {
            const list = [
                {n: 'Subuh', t: prayerData.Fajr},
                {n: 'Dzuhur', t: prayerData.Dhuhr},
                {n: 'Ashar', t: prayerData.Asr},
                {n: 'Maghrib', t: prayerData.Maghrib},
                {n: 'Isya', t: prayerData.Isha}
            ];
            document.getElementById('timesList').innerHTML = list.map(i => `
                <div class="flex flex-col items-center bg-white/5 py-4 rounded-2xl border border-white/5">
                    <span class="text-[7px] font-black text-gray-500 uppercase mb-2">${i.n}</span>
                    <span class="text-[11px] font-bold font-mono-custom text-gray-300">${i.t}</span>
                </div>
            `).join('');
        }

        function updateUI() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('id-ID', {hour12:false, hour:'2-digit', minute:'2-digit'});
            document.getElementById('date').innerText = now.toLocaleDateString('id-ID', {weekday:'long', day:'numeric', month:'long'});

            const times = [
                {n: 'Subuh', t: prayerData.Fajr}, {n: 'Dzuhur', t: prayerData.Dhuhr},
                {n: 'Ashar', t: prayerData.Asr}, {n: 'Maghrib', t: prayerData.Maghrib},
                {n: 'Isya', t: prayerData.Isha}
            ];
            
            const currentSec = now.getHours() * 3600 + now.getMinutes() * 60 + now.getSeconds();
            let next = times.map(t => {
                const [h,m] = t.t.split(':');
                return {n: t.n, s: parseInt(h)*3600 + parseInt(m)*60};
            }).find(t => t.s > currentSec);

            if (!next) next = {n: 'Subuh', s: (parseInt(times[0].t.split(':')[0])*3600 + parseInt(times[0].t.split(':')[1])*60) + 86400};

            const diff = next.s - currentSec;
            const h = Math.floor(diff/3600).toString().padStart(2,'0');
            const m = Math.floor((diff%3600)/60).toString().padStart(2,'0');
            const s = (diff%60).toString().padStart(2,'0');
            
            document.getElementById('countdown').innerText = `${h}:${m}:${s}`;
            document.getElementById('nextName').innerText = `Menuju ${next.n}`;

            if (diff === 0) audio.play();
        }

        window.showManual = () => document.getElementById('manualBox').classList.toggle('hidden');
        window.useManual = () => {
            const lat = parseFloat(document.getElementById('latInput').value);
            const lon = parseFloat(document.getElementById('lonInput').value);
            if (!isNaN(lat) && !isNaN(lon)) proceedWithLocation(lat, lon, "Koordinat Manual");
        };
        window.backToSetup = () => location.reload();
        
        document.addEventListener('click', e => {
            if(!document.getElementById('searchInput').contains(e.target)) 
                document.getElementById('suggestions').classList.add('hidden');
        });
    </script>
</body>
</html>
