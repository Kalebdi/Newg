<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Solihah — Waktu Shalat Presisi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;400;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #000;
            color: #fff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
        }
        
        .glass {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
        }
        
        .glow-text {
            text-shadow: 0 0 40px rgba(59, 130, 246, 0.4);
        }
        
        .gradient-text {
            background: linear-gradient(to bottom, #fff, #444);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .loading-spinner {
            border: 2px solid rgba(255,255,255,0.1);
            border-top-color: #3b82f6;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        input:focus {
            outline: none;
            border-color: #3b82f6;
        }
        
        .city-suggestion {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.95);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            max-height: 200px;
            overflow-y: auto;
            z-index: 50;
            backdrop-filter: blur(10px);
        }
        
        .city-suggestion div {
            padding: 10px 16px;
            cursor: pointer;
            font-size: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        
        .city-suggestion div:hover {
            background: rgba(59,130,246,0.3);
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-8 text-center">

    <!-- Setup Screen -->
    <div id="setup" class="w-full max-w-xs">
        <h1 class="text-4xl font-extrabold tracking-tighter mb-8 italic">SOLIHAH</h1>
        
        <!-- GPS Button -->
        <button onclick="initGPS()" id="gpsBtn" class="w-full border border-white/20 py-5 rounded-full font-bold text-[10px] uppercase tracking-[0.4em] hover:bg-white/10 active:bg-white active:text-black transition-all mb-4">
            📍 DETEKSI LOKASI GPS
        </button>
        
        <!-- City Search -->
        <div class="mt-4 w-full">
            <div class="relative w-full">
                <input type="text" id="citySearch" placeholder="Cari kota, misal: Tangerang, Jakarta, Surabaya" 
                       class="w-full bg-black/50 border border-white/20 rounded-full py-3 px-5 text-white text-sm placeholder:text-gray-500 focus:outline-none focus:border-blue-500"
                       onkeyup="suggestCity()"
                       onkeypress="if(event.key === 'Enter') searchCity()">
                <button onclick="searchCity()" class="absolute right-2 top-1/2 -translate-y-1/2 bg-blue-600 text-white text-xs px-4 py-1 rounded-full hover:bg-blue-700 transition">
                    Cari
                </button>
                <div id="suggestions" class="city-suggestion hidden"></div>
            </div>
            <p class="text-[8px] text-gray-500 mt-2">Atau <button onclick="showManualInput()" class="text-blue-400 underline hover:text-blue-300">masukkan koordinat manual</button></p>
        </div>
        
        <!-- Manual Input -->
        <div id="manual-input" class="hidden mt-4">
            <input type="text" id="latInput" placeholder="Lintang (contoh: -6.2088)" class="w-full p-2 bg-black/50 border border-white/20 rounded text-white text-sm mb-2">
            <input type="text" id="lonInput" placeholder="Bujur (contoh: 106.8456)" class="w-full p-2 bg-black/50 border border-white/20 rounded text-white text-sm mb-2">
            <button onclick="useManualCoordinates()" class="bg-blue-600 px-4 py-2 rounded-full text-xs w-full hover:bg-blue-700 transition">
                Gunakan Koordinat Ini
            </button>
        </div>
        
        <!-- Loading Indicator -->
        <div id="loading-indicator" class="hidden mt-4">
            <div class="loading-spinner"></div>
            <p class="text-[10px] text-gray-400 mt-2">Mencari lokasi...</p>
        </div>
    </div>

    <!-- Main UI -->
    <div id="main-ui" class="hidden w-full max-w-sm flex flex-col items-center">
        <div class="flex items-center gap-2 mb-4 opacity-70">
            <div class="w-1.5 h-1.5 bg-blue-500 rounded-full animate-pulse"></div>
            <p id="city" class="text-[9px] font-black uppercase tracking-[0.5em] italic">Memuat...</p>
        </div>

        <h1 id="main-clock" class="text-8xl font-extrabold tracking-tighter leading-none mb-10 glow-text italic">00:00</h1>
        
        <div class="glass w-full py-8 rounded-[3rem] mb-10">
            <p id="target-name" class="text-[8px] font-black text-blue-500 uppercase tracking-[0.6em] mb-2 italic">---</p>
            <p id="countdown" class="text-5xl font-light tracking-widest gradient-text">00:00:00</p>
        </div>

        <div id="times-list" class="grid grid-cols-5 gap-2 w-full mb-10 px-2"></div>

        <p id="real-date" class="text-[8px] text-gray-700 font-black uppercase tracking-[0.6em] mt-auto"></p>
        <p id="location-coord" class="text-[6px] text-gray-800 mt-2"></p>
        <button onclick="backToSetup()" class="mt-4 text-[8px] text-gray-600 underline">Ubah Lokasi</button>
    </div>

    <audio id="adzan-audio" preload="auto">
        <source src="https://www.islamcan.com/common/adzan/makkah.mp3" type="audio/mpeg">
    </audio>

    <script>
        let prayerData = null;
        let timerInterval = null;
        let currentLat = null;
        let currentLon = null;
        const audio = document.getElementById('adzan-audio');
        
        // Show manual input
        window.showManualInput = function() {
            document.getElementById('manual-input').classList.toggle('hidden');
        }
        
        // Back to setup
        window.backToSetup = function() {
            if (timerInterval) clearInterval(timerInterval);
            document.getElementById('main-ui').classList.add('hidden');
            document.getElementById('setup').classList.remove('hidden');
            prayerData = null;
        }
        
        // Suggest city using Nominatim
        window.suggestCity = async function() {
            const query = document.getElementById('citySearch').value.trim();
            if (query.length < 3) {
                document.getElementById('suggestions').classList.add('hidden');
                return;
            }
            
            try {
                const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=5&addressdetails=1&countrycodes=id`);
                const data = await response.json();
                
                if (data && data.length > 0) {
                    const suggestionsDiv = document.getElementById('suggestions');
                    suggestionsDiv.innerHTML = data.map(city => `
                        <div onclick="selectCity('${city.lat}', '${city.lon}', '${city.display_name.replace(/'/g, "\\'")}')">
                            ${city.display_name.substring(0, 50)}...
                        </div>
                    `).join('');
                    suggestionsDiv.classList.remove('hidden');
                } else {
                    document.getElementById('suggestions').classList.add('hidden');
                }
            } catch (err) {
                console.error('Suggest error:', err);
            }
        }
        
        window.selectCity = function(lat, lon, name) {
            document.getElementById('citySearch').value = name;
            document.getElementById('suggestions').classList.add('hidden');
            proceedWithCoordinates(parseFloat(lat), parseFloat(lon), name);
        }
        
        // Use manual coordinates
        window.useManualCoordinates = function() {
            const lat = parseFloat(document.getElementById('latInput').value);
            const lon = parseFloat(document.getElementById('lonInput').value);
            
            if (isNaN(lat) || isNaN(lon)) {
                alert("Masukkan lintang dan bujur yang valid.\n\nContoh:\nLintang: -6.2088\nBujur: 106.8456");
                return;
            }
            
            if (lat < -90 || lat > 90 || lon < -180 || lon > 180) {
                alert("Koordinat tidak valid. Lintang: -90 s/d 90, Bujur: -180 s/d 180");
                return;
            }
            
            proceedWithCoordinates(lat, lon, `Manual: ${lat.toFixed(4)}°, ${lon.toFixed(4)}°`);
        }
        
        // Search city via Nominatim
        window.searchCity = async function() {
            const query = document.getElementById('citySearch').value.trim();
            if (!query) {
                alert("Masukkan nama kota yang ingin dicari.");
                return;
            }
            
            const loading = document.getElementById('loading-indicator');
            loading.classList.remove('hidden');
            
            try {
                const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=1&addressdetails=1`);
                const data = await response.json();
                loading.classList.add('hidden');
                
                if (data && data.length > 0) {
                    const { lat, lon, display_name } = data[0];
                    proceedWithCoordinates(parseFloat(lat), parseFloat(lon), display_name);
                } else {
                    alert("Kota tidak ditemukan. Coba dengan nama yang lebih spesifik.");
                }
            } catch (err) {
                loading.classList.add('hidden');
                console.error('Search error:', err);
                alert("Gagal mencari kota. Periksa koneksi internet dan coba lagi.");
            }
        }
        
        // GPS initialization
        window.initGPS = function() {
            if (!navigator.geolocation) {
                alert("Browser Anda tidak mendukung GPS. Silakan gunakan pencarian kota atau input manual.");
                return;
            }
            
            const btn = document.getElementById('gpsBtn');
            const originalText = btn.innerText;
            btn.innerText = "MENDAPATKAN LOKASI...";
            btn.disabled = true;
            
            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    btn.innerText = originalText;
                    btn.disabled = false;
                    const { latitude, longitude } = pos.coords;
                    getLocationName(latitude, longitude);
                },
                (err) => {
                    btn.innerText = originalText;
                    btn.disabled = false;
                    console.error('GPS Error:', err);
                    
                    let errorMsg = "Gagal mendapatkan lokasi GPS. ";
                    if (err.code === 1) errorMsg += "Izin lokasi ditolak. ";
                    else if (err.code === 2) errorMsg += "Lokasi tidak tersedia. ";
                    else if (err.code === 3) errorMsg += "Waktu habis. ";
                    errorMsg += "Gunakan pencarian kota atau input manual.";
                    alert(errorMsg);
                },
                { 
                    enableHighAccuracy: true, 
                    timeout: 15000, 
                    maximumAge: 0 
                }
            );
        }
        
        // Get location name from coordinates
        async function getLocationName(lat, lon) {
            try {
                const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&zoom=18&addressdetails=1`);
                const data = await response.json();
                const addr = data.address || {};
                const locationName = addr.city || addr.town || addr.village || addr.suburb || addr.district || "Lokasi GPS";
                proceedWithCoordinates(lat, lon, locationName);
            } catch (err) {
                console.error('Reverse geocoding error:', err);
                proceedWithCoordinates(lat, lon, `GPS: ${lat.toFixed(4)}°, ${lon.toFixed(4)}°`);
            }
        }
        
        // Process coordinates (get prayer times from Aladhan API)
        async function processCoordinates(lat, lon, locationName = null) {
            currentLat = lat;
            currentLon = lon;
            
            document.getElementById('target-name').innerText = "MEMUAT JADWAL...";
            document.getElementById('countdown').innerText = "00:00:00";
            document.getElementById('location-coord').innerHTML = `${lat.toFixed(4)}°, ${lon.toFixed(4)}°`;
            
            if (locationName) {
                document.getElementById('city').innerHTML = locationName.toUpperCase().substring(0, 30);
            }
            
            try {
                // Panggil langsung API Aladhan (CORS enabled)
                const url = `https://api.aladhan.com/v1/timings?latitude=${lat}&longitude=${lon}&method=20`;
                const response = await fetch(url);
                const data = await response.json();
                
                if (data.code === 200 && data.data && data.data.timings) {
                    prayerData = data.data.timings;
                    renderList();
                    
                    if (timerInterval) clearInterval(timerInterval);
                    timerInterval = setInterval(updateAll, 1000);
                    updateAll();
                } else {
                    throw new Error("Data jadwal tidak valid");
                }
            } catch (err) {
                console.error('Prayer times error:', err);
                document.getElementById('target-name').innerHTML = "GAGAL MEMUAT";
                document.getElementById('countdown').innerHTML = "ERROR";
                alert("Gagal mengambil jadwal shalat. Periksa koneksi internet dan coba lagi.");
            }
        }
        
        function proceedWithCoordinates(lat, lon, locationName = null) {
            document.getElementById('setup').classList.add('hidden');
            document.getElementById('main-ui').classList.remove('hidden');
            processCoordinates(lat, lon, locationName);
        }
        
        function renderList() {
            if (!prayerData) return;
            
            const items = [
                { l: 'Subuh', v: prayerData.Fajr },
                { l: 'Dzuhur', v: prayerData.Dhuhr },
                { l: 'Ashar', v: prayerData.Asr },
                { l: 'Maghrib', v: prayerData.Maghrib },
                { l: 'Isya', v: prayerData.Isha }
            ];
            
            document.getElementById('times-list').innerHTML = items.map(i => `
                <div class="flex flex-col items-center">
                    <span class="text-[7px] text-gray-700 font-black uppercase mb-1 tracking-widest">${i.l}</span>
                    <span class="text-[10px] font-mono font-bold text-gray-400 italic">${i.v}</span>
                </div>
            `).join('');
        }
        
        function updateAll() {
            const now = new Date();
            const currentSec = now.getHours() * 3600 + now.getMinutes() * 60 + now.getSeconds();
            
            // Update clock
            const h = now.getHours().toString().padStart(2, '0');
            const m = now.getMinutes().toString().padStart(2, '0');
            document.getElementById('main-clock').innerText = `${h}:${m}`;
            
            // Update date
            document.getElementById('real-date').innerHTML = now.toLocaleDateString('id-ID', { 
                day: 'numeric', 
                month: 'long', 
                year: 'numeric' 
            });
            
            if (!prayerData) return;
            
            // Schedule prayer times
            const schedule = [
                { n: 'Subuh', t: prayerData.Fajr },
                { n: 'Dzuhur', t: prayerData.Dhuhr },
                { n: 'Ashar', t: prayerData.Asr },
                { n: 'Maghrib', t: prayerData.Maghrib },
                { n: 'Isya', t: prayerData.Isha }
            ];
            
            // Convert to seconds
            const timesSec = schedule.map(s => {
                const [sh, sm] = s.t.split(':');
                return { n: s.n, sec: parseInt(sh) * 3600 + parseInt(sm) * 60 };
            });
            
            // Find next prayer
            let next = null;
            for (let i = 0; i < timesSec.length; i++) {
                if (timesSec[i].sec > currentSec) {
                    next = timesSec[i];
                    break;
                }
            }
            
            // If no next today, get tomorrow's first
            if (!next) {
                next = { ...timesSec[0], sec: timesSec[0].sec + 86400 };
            }
            
            // Check if it's exactly prayer time
            for (let i = 0; i < timesSec.length; i++) {
                if (timesSec[i].sec === currentSec) {
                    audio.play().catch(e => console.log('Audio play failed:', e));
                    break;
                }
            }
            
            // Calculate countdown
            const diff = next.sec - currentSec;
            const dh = Math.floor(diff / 3600).toString().padStart(2, '0');
            const dm = Math.floor((diff % 3600) / 60).toString().padStart(2, '0');
            const ds = (diff % 60).toString().padStart(2, '0');
            
            document.getElementById('countdown').innerText = `${dh}:${dm}:${ds}`;
            document.getElementById('target-name').innerHTML = `Menuju ${next.n}`;
        }
        
        // Hide suggestions when clicking outside
        document.addEventListener('click', function(e) {
            if (!document.getElementById('citySearch').contains(e.target)) {
                document.getElementById('suggestions').classList.add('hidden');
            }
        });
        
        // Clean up on page unload
        window.addEventListener('beforeunload', () => {
            if (timerInterval) clearInterval(timerInterval);
        });
    </script>
</body>
</html>
