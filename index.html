<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Adzan GPS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; }
        .card { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">

    <div id="setup" class="text-center w-full max-w-sm">
        <div class="mb-6">
            <div class="w-20 h-20 bg-blue-600 rounded-full flex items-center justify-center mx-auto mb-4 animate-bounce">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
                </svg>
            </div>
            <h2 class="text-2xl font-bold mb-2">Aktifkan GPS</h2>
            <p class="text-gray-400 text-sm mb-6">Klik tombol di bawah dan pilih <b>"Izinkan" (Allow)</b> saat Chrome meminta akses lokasi.</p>
        </div>
        <button onclick="initGPS()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl shadow-lg transition-transform active:scale-95">
            MULAI & CEK JADWAL
        </button>
    </div>

    <div id="main-ui" class="hidden w-full max-w-sm">
        <div class="card rounded-[2.5rem] p-6 mb-4 text-center">
            <p id="city" class="text-blue-400 font-bold tracking-widest uppercase text-[10px] mb-1 italic">Mencari...</p>
            <div id="countdown" class="text-5xl font-black my-2 tracking-tighter text-white">00:00:00</div>
            <p id="target-name" class="text-xs font-bold text-blue-500 uppercase tracking-widest italic">Memuat Jadwal...</p>
        </div>

        <div id="times-list" class="space-y-2"></div>
    </div>

    <script>
        let prayerData = null;

        function initGPS() {
            if (navigator.geolocation) {
                // Opsi GPS tinggi (High Accuracy) untuk memaksa HP nyalain sensor
                const options = {
                    enableHighAccuracy: true,
                    timeout: 10000,
                    maximumAge: 0
                };

                navigator.geolocation.getCurrentPosition(success, error, options);
            } else {
                alert("Browser kamu tidak mendukung GPS.");
            }
        }

        function success(pos) {
            document.getElementById('setup').classList.add('hidden');
            document.getElementById('main-ui').classList.remove('hidden');
            
            const {latitude, longitude} = pos.coords;
            fetch(`https://api.aladhan.com/v1/timings?latitude=${latitude}&longitude=${longitude}&method=20`)
            .then(r => r.json())
            .then(res => {
                prayerData = res.data.timings;
                document.getElementById('city').innerText = res.data.meta.timezone.split('/')[1].replace('_',' ');
                renderList();
                setInterval(updateCountdown, 1000);
            });
        }

        function error(err) {
            let msg = "Gagal akses GPS.";
            if (err.code === 1) msg = "Izin lokasi ditolak. Silakan cek pengaturan Chrome.";
            if (err.code === 3) msg = "Waktu habis. Pastikan GPS HP sudah nyala.";
            alert(msg);
        }

        function renderList() {
            const list = [
                {l: 'Subuh', v: prayerData.Fajr},
                {l: 'Dzuhur', v: prayerData.Dhuhr},
                {l: 'Ashar', v: prayerData.Asr},
                {l: 'Maghrib', v: prayerData.Maghrib},
                {l: 'Isya', v: prayerData.Isha}
            ];
            document.getElementById('times-list').innerHTML = list.map(item => `
                <div class="flex justify-between items-center card p-4 rounded-2xl">
                    <span class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">${item.l}</span>
                    <span class="text-xl font-mono font-bold text-blue-400">${item.v}</span>
                </div>
            `).join('');
        }

        function updateCountdown() {
            const now = new Date();
            const currentSec = now.getHours() * 3600 + now.getMinutes() * 60 + now.getSeconds();
            
            const sch = [
                {n: 'Subuh', t: prayerData.Fajr},
                {n: 'Dzuhur', t: prayerData.Dhuhr},
                {n: 'Ashar', t: prayerData.Asr},
                {n: 'Maghrib', t: prayerData.Maghrib},
                {n: 'Isya', t: prayerData.Isha}
            ];

            let next = null;
            for (let s of sch) {
                const [h, m] = s.t.split(':');
                const pSec = parseInt(h) * 3600 + parseInt(m) * 60;
                if (pSec > currentSec) { next = { n: s.n, t: pSec }; break; }
            }
            if (!next) { 
                const [h, m] = sch[0].t.split(':');
                next = { n: sch[0].n, t: (parseInt(h) * 3600 + parseInt(m) * 60) + 86400 };
            }

            const diff = next.t - currentSec;
            const h = Math.floor(diff / 3600);
            const m = Math.floor((diff % 3600) / 60);
            const s = diff % 60;

            document.getElementById('countdown').innerText = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
            document.getElementById('target-name').innerText = `Menuju ${next.n}`;
        }
    </script>
</body>
    </html>
