<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Solihah - Sukasari Mode</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        .glass { background: rgba(255, 255, 255, 0.04); border: 1px solid rgba(255,255,255,0.1); }
        .glow-text { text-shadow: 0 0 20px rgba(59, 130, 246, 0.5); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6 text-center">

    <div id="setup" class="w-full max-w-sm">
        <div class="mb-10">
            <div class="w-20 h-20 bg-blue-600 rounded-[2rem] flex items-center justify-center mx-auto mb-4 shadow-2xl">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
                </svg>
            </div>
            <h1 class="text-3xl font-black tracking-tighter">SOLIHAH</h1>
            <p class="text-gray-500 text-[10px] mt-1 font-bold tracking-widest uppercase">Update Lokasi Sukasari</p>
        </div>
        <button onclick="initSolihah()" class="w-full bg-blue-600 py-5 rounded-[2rem] font-black active:scale-95 transition shadow-xl">
            SAYA DI SUKASARI SEKARANG
        </button>
    </div>

    <div id="main-ui" class="hidden w-full max-w-sm">
        <div class="mb-8">
            <p id="city" class="text-blue-500 font-black tracking-[0.3em] text-[10px] uppercase italic mb-2">Mencari...</p>
            
            <h1 id="main-clock" class="text-7xl font-black tracking-tighter leading-none mb-6 glow-text">00:00:00</h1>
            
            <div class="inline-block px-8 py-3 rounded-3xl bg-blue-900/30 border border-blue-500/20">
                <p id="target-name" class="text-[9px] font-bold text-blue-400 uppercase tracking-[0.2em] mb-1 italic">Menuju ---</p>
                <p id="countdown" class="text-2xl font-mono font-bold text-white tracking-widest">00:00:00</p>
            </div>
        </div>

        <div id="times-list" class="space-y-2.5 text-left"></div>

        <div class="mt-10 pt-4 border-t border-white/5 opacity-50">
            <p id="real-date" class="text-[9px] font-black uppercase tracking-[0.4em]"></p>
        </div>
    </div>

    <audio id="adzan-audio" src="https://www.islamcan.com/common/adzan/makkah.mp3" preload="auto"></audio>

    <script>
        let prayerData = null;
        let reminded = false;
        const audio = document.getElementById('adzan-audio');

        function initSolihah() {
            audio.play().then(() => { audio.pause(); audio.currentTime = 0; }).catch(() => {});
            
            // PAKSA GPS AMBIL DATA BARU (Anti-Saruni)
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(success, () => alert("GPS Error"), { 
                    enableHighAccuracy: true, 
                    timeout: 20000, 
                    maximumAge: 0 // Wajib 0 agar tidak ambil lokasi lama (Saruni)
                });
            }
        }

        async function success(pos) {
            document.getElementById('setup').classList.add('hidden');
            document.getElementById('main-ui').classList.remove('hidden');
            const {latitude, longitude} = pos.coords;

            // Update Lokasi Detail
            try {
                const geo = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${latitude}&lon=${longitude}`);
                const data = await geo.json();
                const lokasi = data.address.village || data.address.suburb || data.address.city_district || "Sukasari";
                document.getElementById('city').innerText = lokasi;
            } catch(e) { document.getElementById('city').innerText = "Sukasari Aktif"; }

            // Ambil Jadwal
            const res = await fetch(`https://api.aladhan.com/v1/timings?latitude=${latitude}&longitude=${longitude}&method=20`);
            const d = await res.json();
            prayerData = d.data.timings;
            
            renderList();
            setInterval(updateAll, 1000);
            updateAll();
        }

        function updateAll() {
            const now = new Date();
            const currentSec = now.getHours() * 3600 + now.getMinutes() * 60 + now.getSeconds();
            
            document.getElementById('main-clock').innerText = now.toLocaleTimeString('en-GB', { hour12: false });
            document.getElementById('real-date').innerText = now.toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long' });

            if (prayerData) {
                const sch = [
                    {n: 'Subuh', t: prayerData.Fajr}, {n: 'Dzuhur', t: prayerData.Dhuhr},
                    {n: 'Ashar', t: prayerData.Asr}, {n: 'Maghrib', t: prayerData.Maghrib}, {n: 'Isya', t: prayerData.Isha}
                ];

                let next = null;
                for (let s of sch) {
                    const [h, m] = s.t.split(':');
                    const pSec = parseInt(h) * 3600 + parseInt(m) * 60;
                    if (pSec === currentSec) audio.play();
                    if (pSec - currentSec === 300 && !reminded) { if(navigator.vibrate) navigator.vibrate(500); reminded = true; }
                    if (pSec > currentSec) { next = { n: s.n, t: pSec }; break; }
                }

                if (!next) { 
                    const [h, m] = sch[0].t.split(':');
                    next = { n: sch[0].n, t: (parseInt(h) * 3600 + parseInt(m) * 60) + 86400 };
                }

                const diff = next.t - currentSec;
                const h = Math.floor(diff / 3600).toString().padStart(2,'0');
                const m = Math.floor((diff % 3600) / 60).toString().padStart(2,'0');
                const s = (diff % 60).toString().padStart(2,'0');
                
                document.getElementById('countdown').innerText = `${h}:${m}:${s}`;
                document.getElementById('target-name').innerText = `Menuju ${next.n}`;
            }
        }

        function renderList() {
            const items = [{l:'Subuh',v:prayerData.Fajr}, {l:'Dzuhur',v:prayerData.Dhuhr}, {l:'Ashar',v:prayerData.Asr}, {l:'Maghrib',v:prayerData.Maghrib}, {l:'Isya',v:prayerData.Isha}];
            document.getElementById('times-list').innerHTML = items.map(i => `
                <div class="flex justify-between items-center glass p-4 rounded-[2rem]">
                    <span class="text-[9px] font-black text-gray-600 uppercase tracking-widest">${i.l}</span>
                    <span class="text-xl font-mono font-bold text-blue-500">${i.v}</span>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
