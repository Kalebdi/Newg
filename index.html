<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Solihah - Sukasari Fixed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255,255,255,0.07); }
        .active-glow { border-color: #3b82f6; box-shadow: 0 0 15px rgba(59, 130, 246, 0.2); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6 text-center">

    <div id="setup" class="w-full max-w-sm">
        <h1 class="text-4xl font-black mb-6 tracking-tighter">SOLIHAH</h1>
        <button onclick="initSolihah()" class="w-full bg-blue-600 text-white font-black py-5 rounded-3xl active:scale-95 transition shadow-lg">
            KONFIRMASI LOKASI & GPS
        </button>
        <p class="text-gray-500 text-[10px] mt-4 uppercase tracking-widest font-bold">Pastikan GPS aktif di Sukasari</p>
    </div>

    <div id="main-ui" class="hidden w-full max-w-sm">
        <div class="mb-8">
            <div class="flex items-center justify-center gap-2 mb-2">
                <span class="w-2 h-2 bg-blue-500 rounded-full animate-pulse"></span>
                <p id="city" class="text-blue-500 font-black tracking-[0.2em] text-[10px] uppercase italic">Mendeteksi...</p>
            </div>
            
            <h1 id="main-clock" class="text-7xl font-black tracking-tighter leading-none mb-4">00:00:00</h1>
            
            <div class="inline-block px-6 py-2 rounded-2xl bg-blue-900/30 border border-blue-500/20 active-glow">
                <p id="target-name" class="text-[9px] font-bold text-blue-400 uppercase tracking-widest mb-1">Menuju ---</p>
                <p id="countdown" class="text-2xl font-mono font-bold text-white tracking-widest leading-none">00:00:00</p>
            </div>
        </div>

        <div id="times-list" class="space-y-2 text-left"></div>

        <p id="real-date" class="mt-8 text-[9px] text-gray-700 font-black uppercase tracking-[0.4em]"></p>
    </div>

    <audio id="adzan-audio" src="https://www.islamcan.com/common/adzan/makkah.mp3" preload="auto"></audio>

    <script>
        let prayerData = null;
        let reminded = false;
        const audio = document.getElementById('adzan-audio');

        function initSolihah() {
            audio.play().then(() => { audio.pause(); audio.currentTime = 0; }).catch(() => {});
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(success, error, { 
                    enableHighAccuracy: true,
                    timeout: 10000,
                    maximumAge: 0 
                });
            }
        }

        async function success(pos) {
            document.getElementById('setup').classList.add('hidden');
            document.getElementById('main-ui').classList.remove('hidden');
            const {latitude, longitude} = pos.coords;

            // REVERSE GEOCODING (Cari nama jalan/desa/kecamatan)
            try {
                const geo = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${latitude}&lon=${longitude}`);
                const data = await geo.json();
                // Mengambil nama area paling spesifik (Sukasari)
                const area = data.address.village || data.address.suburb || data.address.city_district || data.address.city;
                document.getElementById('city').innerText = area;
            } catch(e) { document.getElementById('city').innerText = "Lokasi Aktif"; }

            // AMBIL JADWAL ADZAN BERDASARKAN KOORDINAT GPS
            const res = await fetch(`https://api.aladhan.com/v1/timings?latitude=${latitude}&longitude=${longitude}&method=20`);
            const d = await res.json();
            prayerData = d.data.timings;
            
            renderList();
            setInterval(updateTick, 1000);
            updateTick();
        }

        function error() { alert("Gagal mendeteksi Sukasari. Cek izin lokasi di Chrome."); }

        function updateTick() {
            const now = new Date();
            const currentSec = now.getHours() * 3600 + now.getMinutes() * 60 + now.getSeconds();
            
            // JAM BESAR (JAM SEKARANG)
            document.getElementById('main-clock').innerText = now.toLocaleTimeString('en-GB', { hour12: false });
            document.getElementById('real-date').innerText = now.toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long' });

            if (prayerData) {
                const sch = [
                    {n: 'Subuh', t: prayerData.Fajr}, {n: 'Dzuhur', t: prayerData.Dhuhr},
                    {n: 'Ashar', t: prayerData.Asr}, {n: 'Maghrib', t: prayerData.Maghrib}, {n: 'Isya', t: prayerData.Isha}
                ];

                let next = null;
                for (let s of sch) {
                    const [h, m] = s.t.split(':');
                    const pSec = parseInt(h) * 3600 + parseInt(m) * 60;

                    // AKTIFKAN ADZAN
                    if (pSec === currentSec) { audio.play(); if(navigator.vibrate) navigator.vibrate([500,200,500]); }
                    
                    // GETAR 5 MENIT SEBELUMNYA
                    if (pSec - currentSec === 300 && !reminded) { if(navigator.vibrate) navigator.vibrate(500); reminded = true; }

                    if (pSec > currentSec) { next = { n: s.n, t: pSec }; break; }
                }

                if (!next) { 
                    const [h, m] = sch[0].t.split(':');
                    next = { n: sch[0].n, t: (parseInt(h) * 3600 + parseInt(m) * 60) + 86400 };
                }

                // UPDATE HITUNG MUNDUR (DI DALAM KOTAK BIRU)
                const diff = next.t - currentSec;
                const h = Math.floor(diff / 3600).toString().padStart(2,'0');
                const m = Math.floor((diff % 3600) / 60).toString().padStart(2,'0');
                const s = (diff % 60).toString().padStart(2,'0');
                
                document.getElementById('countdown').innerText = `${h}:${m}:${s}`;
                document.getElementById('target-name').innerText = `Menuju ${next.n}`;
            }
        }

        function renderList() {
            const items = [{l:'Subuh',v:prayerData.Fajr}, {l:'Dzuhur',v:prayerData.Dhuhr}, {l:'Ashar',v:prayerData.Asr}, {l:'Maghrib',v:prayerData.Maghrib}, {l:'Isya',v:prayerData.Isha}];
            document.getElementById('times-list').innerHTML = items.map(i => `
                <div class="flex justify-between items-center glass p-4 rounded-3xl">
                    <span class="text-[9px] font-black text-gray-600 uppercase tracking-widest">${i.l}</span>
                    <span class="text-xl font-mono font-bold text-blue-400">${i.v}</span>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
