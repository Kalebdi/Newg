<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Solihah v2.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255,255,255,0.08); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6 text-center">

    <div id="setup" class="w-full max-w-sm">
        <h1 class="text-5xl font-black mb-4 tracking-tighter text-blue-600">SOLIHAH</h1>
        <p class="text-gray-400 mb-8 text-sm uppercase tracking-widest font-bold">Aplikasi Waktu Sholat</p>
        <button onclick="initSolihah()" class="w-full bg-white text-black font-black py-5 rounded-[2rem] active:scale-95 transition shadow-[0_0_20px_rgba(255,255,255,0.2)]">
            MASUK KE APLIKASI
        </button>
    </div>

    <div id="main-ui" class="hidden w-full max-w-sm">
        <div class="mb-10">
            <div class="flex items-center justify-center gap-2 mb-2">
                <span class="w-2 h-2 bg-blue-500 rounded-full animate-ping"></span>
                <p id="city" class="text-blue-500 font-black tracking-[0.3em] text-[11px] uppercase italic">Mendeteksi Sukasari...</p>
            </div>
            
            <h1 id="main-clock" class="text-7xl font-black tracking-tighter leading-none mb-6">00:00:00</h1>
            
            <div class="inline-block px-8 py-3 rounded-3xl bg-blue-900/40 border border-blue-500/30">
                <p id="target-name" class="text-[10px] font-bold text-blue-300 uppercase tracking-widest mb-1 italic">Menuju ---</p>
                <p id="countdown" class="text-2xl font-mono font-bold text-white tracking-[0.2em]">00:00:00</p>
            </div>
        </div>

        <div id="times-list" class="space-y-3 text-left"></div>

        <p id="real-date" class="mt-10 text-[10px] text-gray-700 font-black uppercase tracking-[0.5em]"></p>
    </div>

    <audio id="adzan-audio" src="https://www.islamcan.com/common/adzan/makkah.mp3" preload="auto"></audio>

    <script>
        let prayerData = null;
        let reminded = false;
        const audio = document.getElementById('adzan-audio');

        function initSolihah() {
            audio.play().then(() => { audio.pause(); audio.currentTime = 0; }).catch(() => {});
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(success, error, { 
                    enableHighAccuracy: true,
                    timeout: 15000,
                    maximumAge: 0 
                });
            }
        }

        async function success(pos) {
            document.getElementById('setup').classList.add('hidden');
            document.getElementById('main-ui').classList.remove('hidden');
            const {latitude, longitude} = pos.coords;

            try {
                const geo = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${latitude}&lon=${longitude}`);
                const data = await geo.json();
                // Prioritas Sukasari/Kecamatan
                const area = data.address.village || data.address.suburb || data.address.city_district || data.address.city;
                document.getElementById('city').innerText = area;
            } catch(e) { document.getElementById('city').innerText = "Sukasari Terdeteksi"; }

            const res = await fetch(`https://api.aladhan.com/v1/timings?latitude=${latitude}&longitude=${longitude}&method=20`);
            const d = await res.json();
            prayerData = d.data.timings;
            
            renderList();
            setInterval(updateTick, 1000);
            updateTick();
        }

        function error() { alert("Izin GPS Ditolak! Cek Pengaturan Chrome."); }

        function updateTick() {
            const now = new Date();
            const currentSec = now.getHours() * 3600 + now.getMinutes() * 60 + now.getSeconds();
            
            // UPDATE JAM UTAMA
            document.getElementById('main-clock').innerText = now.toLocaleTimeString('en-GB', { hour12: false });
            document.getElementById('real-date').innerText = now.toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long' });

            if (prayerData) {
                const sch = [
                    {n: 'Subuh', t: prayerData.Fajr}, {n: 'Dzuhur', t: prayerData.Dhuhr},
                    {n: 'Ashar', t: prayerData.Asr}, {n: 'Maghrib', t: prayerData.Maghrib}, {n: 'Isya', t: prayerData.Isha}
                ];

                let next = null;
                for (let s of sch) {
                    const [h, m] = s.t.split(':');
                    const pSec = parseInt(h) * 3600 + parseInt(m) * 60;

                    if (pSec === currentSec) { audio.play(); }
                    if (pSec - currentSec === 300 && !reminded) { if(navigator.vibrate) navigator.vibrate(500); reminded = true; }
                    if (pSec > currentSec) { next = { n: s.n, t: pSec }; break; }
                }

                if (!next) { 
                    const [h, m] = sch[0].t.split(':');
                    next = { n: sch[0].n, t: (parseInt(h) * 3600 + parseInt(m) * 60) + 86400 };
                }

                const diff = next.t - currentSec;
                const h = Math.floor(diff / 3600).toString().padStart(2,'0');
                const m = Math.floor((diff % 3600) / 60).toString().padStart(2,'0');
                const s = (diff % 60).toString().padStart(2,'0');
                
                document.getElementById('countdown').innerText = `${h}:${m}:${s}`;
                document.getElementById('target-name').innerText = `Menuju ${next.n}`;
            }
        }

        function renderList() {
            const items = [{l:'Subuh',v:prayerData.Fajr}, {l:'Dzuhur',v:prayerData.Dhuhr}, {l:'Ashar',v:prayerData.Asr}, {l:'Maghrib',v:prayerData.Maghrib}, {l:'Isya',v:prayerData.Isha}];
            document.getElementById('times-list').innerHTML = items.map(i => `
                <div class="flex justify-between items-center glass p-5 rounded-[2rem]">
                    <span class="text-[10px] font-black text-gray-600 uppercase tracking-widest">${i.l}</span>
                    <span class="text-xl font-mono font-bold text-blue-500">${i.v}</span>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
